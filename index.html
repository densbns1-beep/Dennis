<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😏</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main */
.container {
    text-align: center;
}

h1 {
    font-size: 24px;
    margin-bottom: 30px;
}

button {
    padding: 14px 28px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    margin: 10px;
    cursor: pointer;
}

/* Buttons */
#yesBtn {
    background: #00c853;
    color: white;
}

#noBtn {
    background: #ff1744;
    color: white;
    position: absolute;
}

/* Loading */
.loading {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    color: white;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}

/* Fake phone popup */
.popup {
    display: none;
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #1c1c1e;
    color: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    text-align: center;
    animation: slideUp 0.3s ease;
}

.popup button {
    background: #ff3b30;
    color: white;
    width: 100%;
    margin-top: 15px;
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Are you short? 🤔</h1>
    <button id="yesBtn">Yes 😔</button>
    <button id="noBtn">No 😤</button>
</div>

<div class="loading" id="loading">
    Scanning your height... 📏👀
</div>

<div class="popup" id="popup">
    <h2>I knew it 😎</h2>
    <p>I'm taller than you 💀</p>
    <button onclick="closePopup()">OK</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const popup = document.getElementById("popup");
const loading = document.getElementById("loading");

// Move NO button (works on mobile + PC)
function moveButton() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("touchstart", moveButton);
noBtn.addEventListener("mouseover", moveButton);

// YES button action (NO alert)
yesBtn.onclick = () => {
    loading.style.display = "flex";

    // vibration (if supported)
    if (navigator.vibrate) navigator.vibrate(200);

    setTimeout(() => {
        loading.style.display = "none";
        popup.style.display = "block";
    }, 2000);
};

function closePopup() {
    popup.style.display = "none";
}
</script>

</body>
</html>
