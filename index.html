<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy PRO MAX</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#70c5ce; }
canvas { display:block; margin:auto; }

#menu, #gameOver {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

button {
  padding:12px 20px;
  font-size:18px;
  background:orange;
  border:none;
  cursor:pointer;
}
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<div id="menu">
  <h1>🐦 Flappy PRO</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver" style="display:none;">
  <h1>💀 Game Over</h1>
  <h2 id="finalScore"></h2>
  <h3 id="highScore"></h3>
  <button onclick="restart()">Play Again</button>
</div>

<audio id="jump" src="https://assets.mixkit.co/sfx/preview/mixkit-quick-jump-arcade-game-239.mp3"></audio>
<audio id="hit" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🐦 bird animation frames
const birdFrames = [
  "assets/bird1.png",
  "assets/bird2.png",
  "assets/bird3.png"
].map(src => {
  let img = new Image();
  img.src = src;
  return img;
});

const cloudImg = new Image();
cloudImg.src = "assets/cloud.png";

let bird, pipes, clouds, particles;
let score, running, frame, groundX, gameStarted;

// INIT
function init() {
  bird = { x:60, y:150, velocity:0, gravity:0.5, lift:-9 };
  pipes = [];
  clouds = [];
  particles = [];
  score = 0;
  running = true;
  frame = 0;
  groundX = 0;
}

// START
function startGame() {
  document.getElementById("menu").style.display = "none";
  gameStarted = true;
  init();
  update();
}

// CLOUDS
function createCloud() {
  clouds.push({ x:400, y:Math.random()*200, speed:1 });
}

function drawClouds() {
  clouds.forEach(c=>{
    ctx.drawImage(cloudImg,c.x,c.y,80,50);
    c.x-=c.speed;
  });
  clouds = clouds.filter(c=>c.x>-100);
}

// PARTICLES
function createParticles(x,y){
  for(let i=0;i<5;i++){
    particles.push({x,y,vx:Math.random()*2-1,vy:Math.random()*2-1,life:30});
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.fillRect(p.x,p.y,3,3);
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles = particles.filter(p=>p.life>0);
}

// BIRD
function drawBird() {
  let img = birdFrames[Math.floor(frame/5)%birdFrames.length];
  ctx.drawImage(img, bird.x-20, bird.y-20, 40, 40);
}

// PIPES
function createPipe() {
  let gap = 130;
  let top = Math.random()*250;

  pipes.push({
    x:400,
    top,
    bottom:600-top-gap,
    passed:false
  });
}

function drawPipes(){
  pipes.forEach(p=>{
    ctx.fillStyle="#2ecc71";
    ctx.fillRect(p.x,0,50,p.top);
    ctx.fillRect(p.x,600-p.bottom,50,p.bottom);

    p.x-=3;

    if(
      bird.x+15>p.x &&
      bird.x-15<p.x+50 &&
      (bird.y-15<p.top || bird.y+15>600-p.bottom)
    ){
      gameOver();
    }

    if(!p.passed && p.x<bird.x){
      score++;
      document.getElementById("jump").play();
      p.passed=true;
    }
  });

  pipes = pipes.filter(p=>p.x>-50);
}

// GROUND
function drawGround(){
  groundX-=3;
  ctx.fillStyle="#8B4513";
  ctx.fillRect(groundX,550,400,50);
  ctx.fillRect(groundX+400,550,400,50);
  if(groundX<=-400) groundX=0;
}

// UPDATE
function update(){
  if(!running) return;

  ctx.clearRect(0,0,400,600);

  drawClouds();

  bird.velocity+=bird.gravity;
  bird.y+=bird.velocity;

  if(bird.y>550 || bird.y<0) gameOver();

  drawBird();
  drawPipes();
  drawGround();
  drawParticles();

  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,10,20);

  frame++;
  requestAnimationFrame(update);
}

// CONTROLS
function flap(){
  if(!gameStarted) return;
  bird.velocity = bird.lift;
  document.getElementById("jump").play();
  createParticles(bird.x,bird.y);
}

document.addEventListener("keydown", flap);
document.addEventListener("touchstart", flap);

// GAME OVER
function gameOver(){
  running=false;
  document.getElementById("hit").play();

  let high = localStorage.getItem("high") || 0;
  if(score>high){
    localStorage.setItem("high",score);
    high=score;
  }

  document.getElementById("finalScore").innerText="Score: "+score;
  document.getElementById("highScore").innerText="High Score: "+high;
  document.getElementById("gameOver").style.display="block";
}

// RESTART
function restart(){
  document.getElementById("gameOver").style.display="none";
  init();
  update();
}

// SPAWN
setInterval(createPipe,1800);
setInterval(createCloud,2000);
</script>

</body>
</html>
