<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Pro</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#70c5ce, #ffffff);
  }

  canvas {
    display: block;
    margin: auto;
  }

  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    text-align: center;
    color: black;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    background: #ffcc00;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<div id="gameOver">
  <h1>💀 Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="restart()">Play Again</button>
</div>

<audio id="jumpSound" src="https://assets.mixkit.co/sfx/preview/mixkit-quick-jump-arcade-game-239.mp3"></audio>
<audio id="hitSound" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird, pipes, score, running;

function init() {
  bird = {
    x: 60,
    y: 150,
    velocity: 0,
    gravity: 0.5,
    lift: -9
  };

  pipes = [];
  score = 0;
  running = true;
}

function drawBird() {
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, 15, 0, Math.PI * 2);
  ctx.fill();
}

function createPipe() {
  let gap = 130;
  let top = Math.random() * 250;

  pipes.push({
    x: canvas.width,
    top,
    bottom: canvas.height - top - gap,
    passed: false
  });
}

function drawPipes() {
  pipes.forEach(p => {
    // pipe
    ctx.fillStyle = "green";
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, canvas.height - p.bottom, 50, p.bottom);

    // shadow
    ctx.fillStyle = "darkgreen";
    ctx.fillRect(p.x + 40, 0, 10, p.top);
    ctx.fillRect(p.x + 40, canvas.height - p.bottom, 10, p.bottom);

    p.x -= 3;

    // collision
    if (
      bird.x + 15 > p.x &&
      bird.x - 15 < p.x + 50 &&
      (bird.y - 15 < p.top || bird.y + 15 > canvas.height - p.bottom)
    ) {
      gameOver();
    }

    // score
    if (!p.passed && p.x < bird.x) {
      score++;
      p.passed = true;
    }
  });

  pipes = pipes.filter(p => p.x > -50);
}

function drawBackground() {
  ctx.fillStyle = "#70c5ce";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function update() {
  if (!running) return;

  drawBackground();

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (bird.y > canvas.height || bird.y < 0) {
    gameOver();
  }

  drawBird();
  drawPipes();

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  requestAnimationFrame(update);
}

function flap() {
  if (!running) return;
  bird.velocity = bird.lift;
  document.getElementById("jumpSound").play();
}

function gameOver() {
  running = false;
  document.getElementById("hitSound").play();
  document.getElementById("finalScore").innerText = "Score: " + score;
  document.getElementById("gameOver").style.display = "block";
}

function restart() {
  document.getElementById("gameOver").style.display = "none";
  init();
  update();
}

// controls
document.addEventListener("keydown", flap);
document.addEventListener("touchstart", flap);

// start
init();
update();
setInterval(createPipe, 1800);
</script>

</body>
</html>
