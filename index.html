<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram-Style Camera</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #121212;
    color: #fff;
  }

  h1 {
    margin-bottom: 10px;
  }

  .camera-container {
    position: relative;
    width: 90%;
    max-width: 400px;
    border-radius: 20px;
    overflow: hidden;
    background: #000;
  }

  video, canvas {
    width: 100%;
    border-radius: 20px;
    display: block;
  }

  .controls {
    margin-top: 15px;
    display: flex;
    gap: 15px;
  }

  .button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: #1e90ff;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }

  .button:hover {
    background: #0c6ed0;
  }

  .filters {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-btn {
    padding: 5px 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 12px;
  }
</style>
</head>
<body>

<h1>Instagram Camera</h1>
<div class="camera-container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
</div>

<div class="controls">
  <button class="button" id="capture">📸</button>
  <button class="button" id="switch">🔄</button>
</div>

<div class="filters">
  <button class="filter-btn" data-filter="none">Normal</button>
  <button class="filter-btn" data-filter="grayscale(100%)">Grayscale</button>
  <button class="filter-btn" data-filter="sepia(100%)">Sepia</button>
  <button class="filter-btn" data-filter="invert(100%)">Invert</button>
  <button class="filter-btn" data-filter="contrast(200%)">Contrast</button>
</div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let captureBtn = document.getElementById('capture');
let switchBtn = document.getElementById('switch');
let filters = document.querySelectorAll('.filter-btn');

let currentStream;
let usingFront = true;

// Start camera
async function startCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }
  const constraints = {
    video: { facingMode: usingFront ? "user" : "environment" },
    audio: false
  };
  currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = currentStream;
}

startCamera();

// Switch camera
switchBtn.addEventListener('click', () => {
  usingFront = !usingFront;
  startCamera();
});

// Capture photo
captureBtn.addEventListener('click', () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  let ctx = canvas.getContext('2d');
  ctx.filter = video.style.filter || 'none';
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  canvas.style.display = 'block';
});

// Apply filters
filters.forEach(btn => {
  btn.addEventListener('click', () => {
    video.style.filter = btn.dataset.filter;
  });
});
</script>

</body>
</html>
