<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prank 😈</title>
<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #111, #222);
        color: white;
        overflow: hidden;
    }

    h1 {
        margin-top: 80px;
        font-size: 30px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        margin: 10px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    #yesBtn {
        background-color: #00c853;
        color: white;
    }

    #noBtn {
        background-color: #ff1744;
        color: white;
        position: absolute;
    }

    #loadingScreen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        justify-content: center;
        align-items: center;
        font-size: 25px;
    }
</style>
</head>
<body>

<h1>Are you short? 🤔</h1>

<button id="yesBtn">Yes 😔</button>
<button id="noBtn">No 😤</button>

<div id="loadingScreen">Analyzing height... 👀</div>

<audio id="sound" src="https://www.myinstants.com/media/sounds/troll-lololol.mp3"></audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const sound = document.getElementById("sound");

// NO button runs away (mouse + mobile tap)
function moveButton() {
    let x = Math.random() * (window.innerWidth - 120);
    let y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

// YES button prank
yesBtn.addEventListener("click", () => {
    document.getElementById("loadingScreen").style.display = "flex";
    sound.play();

    setTimeout(() => {
        alert("I knew it 😎 I'm taller than you 💀");
        document.getElementById("loadingScreen").style.display = "none";
    }, 2500);
});
</script>

</body>
</html>
