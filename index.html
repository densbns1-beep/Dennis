<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird Pro+</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#70c5ce, #ffffff);
  }

  canvas {
    display: block;
    margin: auto;
  }

  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    text-align: center;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    background: orange;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<div id="gameOver">
  <h1>💀 Game Over</h1>
  <h2 id="finalScore"></h2>
  <button onclick="restart()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🐦 Load bird image
const birdImg = new Image();
birdImg.src = "https://i.imgur.com/QZ6N9sL.png";

// ☁️ cloud image
const cloudImg = new Image();
cloudImg.src = "https://i.imgur.com/3Wb7G6X.png";

let bird, pipes, score, running, clouds, groundX;

function init() {
  bird = {
    x: 60,
    y: 150,
    velocity: 0,
    gravity: 0.5,
    lift: -9
  };

  pipes = [];
  clouds = [];
  score = 0;
  running = true;
  groundX = 0;
}

// ☁️ create clouds
function createCloud() {
  clouds.push({
    x: canvas.width,
    y: Math.random() * 200,
    speed: 1
  });
}

function drawClouds() {
  clouds.forEach(c => {
    ctx.drawImage(cloudImg, c.x, c.y, 80, 50);
    c.x -= c.speed;
  });

  clouds = clouds.filter(c => c.x > -100);
}

// 🐦 draw bird
function drawBird() {
  ctx.drawImage(birdImg, bird.x - 20, bird.y - 20, 40, 40);
}

// 🧱 pipes
function createPipe() {
  let gap = 130;
  let top = Math.random() * 250;

  pipes.push({
    x: canvas.width,
    top,
    bottom: canvas.height - top - gap,
    passed: false
  });
}

function drawPipes() {
  pipes.forEach(p => {
    ctx.fillStyle = "#2ecc71";

    // top pipe
    ctx.fillRect(p.x, 0, 50, p.top);

    // bottom pipe
    ctx.fillRect(p.x, canvas.height - p.bottom, 50, p.bottom);

    p.x -= 3;

    // collision
    if (
      bird.x + 15 > p.x &&
      bird.x - 15 < p.x + 50 &&
      (bird.y - 15 < p.top || bird.y + 15 > canvas.height - p.bottom)
    ) {
      gameOver();
    }

    // score
    if (!p.passed && p.x < bird.x) {
      score++;
      p.passed = true;
    }
  });

  pipes = pipes.filter(p => p.x > -50);
}

// 🌍 ground
function drawGround() {
  groundX -= 3;
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(groundX, canvas.height - 50, canvas.width, 50);
  ctx.fillRect(groundX + canvas.width, canvas.height - 50, canvas.width, 50);

  if (groundX <= -canvas.width) {
    groundX = 0;
  }
}

// 🎮 update loop
function update() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawClouds();

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (bird.y > canvas.height - 50 || bird.y < 0) {
    gameOver();
  }

  drawBird();
  drawPipes();
  drawGround();

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);

  requestAnimationFrame(update);
}

// 🕹 controls
function flap() {
  if (!running) return;
  bird.velocity = bird.lift;
}

// 💀 game over
function gameOver() {
  running = false;
  document.getElementById("finalScore").innerText = "Score: " + score;
  document.getElementById("gameOver").style.display = "block";
}

// 🔄 restart
function restart() {
  document.getElementById("gameOver").style.display = "none";
  init();
  update();
}

// controls
document.addEventListener("keydown", flap);
document.addEventListener("touchstart", flap);

// start
init();
update();
setInterval(createPipe, 1800);
setInterval(createCloud, 2000);
</script>

</body>
</html>
